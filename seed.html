<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend Seeding Tool — Together We Solve</title>
    <link rel="stylesheet" href="css/ui-polish.css" />
    <style>
      body {
        background: #FAF6F0;
        color: #23382B;
        font-family: 'DM Sans', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .card {
        background: #FFFFFF;
        border: 1px solid rgba(35, 56, 43, 0.15);
        border-radius: 12px;
        padding: 40px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }
      h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 32px;
        margin-top: 0;
        margin-bottom: 12px;
        color: #23382B;
      }
      p {
        line-height: 1.6;
        margin-bottom: 24px;
        opacity: 0.85;
      }
      .btn {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-primary {
        background: #23382B;
        color: #FAF6F0;
      }
      .btn-primary:hover {
        background: #36503f;
      }
      .status {
        margin-top: 24px;
        padding: 16px;
        border-radius: 8px;
        background: #f0ede6;
        font-family: monospace;
        font-size: 13px;
        white-space: pre-wrap;
        max-height: 250px;
        overflow-y: auto;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Backend Seeding Tool</h1>
      <p>This utility clears all 11 writable collections in Firestore, creates or logs in the founder account (spdly.studios@gmail.com), sets their Founder role in firestore, and synchronizes the local storage fallback.</p>
      <button id="seedBtn" class="btn btn-primary">Reset & Seed Backend</button>
      <div id="statusEl" class="status"></div>
    </div>

    <script type="module">
      import { createUserWithEmailAndPassword, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
      import { doc, getDocs, deleteDoc, collection, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
      import { accessCollections } from './js/firebase-config.js';
      import { auth, db } from './js/firebase-core.js';

      const statusEl = document.getElementById('statusEl');
      const seedBtn = document.getElementById('seedBtn');

      function log(msg) {
        statusEl.style.display = 'block';
        statusEl.textContent += msg + '\n';
        statusEl.scrollTop = statusEl.scrollHeight;
      }

      async function clearCollection(name) {
        log(`Clearing collection: ${name}`);
        const snapshot = await getDocs(collection(db, name));
        const promises = snapshot.docs.map(d => deleteDoc(doc(db, name, d.id)));
        await Promise.all(promises);
        log(`Cleared ${snapshot.docs.length} documents from ${name}`);
      }

      seedBtn.addEventListener('click', async () => {
        seedBtn.disabled = true;
        statusEl.textContent = '';
        log('Starting backend reset and seed...');

        try {
          let userCredential;
          try {
            log('Creating user account in Firebase Auth...');
            userCredential = await createUserWithEmailAndPassword(auth, 'spdly.studios@gmail.com', '14030507');
            log('Created new auth user spdly.studios@gmail.com');
          } catch (authErr) {
            if (authErr.code === 'auth/email-already-in-use') {
              log('Auth user already exists, signing in...');
              userCredential = await signInWithEmailAndPassword(auth, 'spdly.studios@gmail.com', '14030507');
              log('Signed in successfully');
            } else {
              throw authErr;
            }
          }

          const uid = userCredential.user.uid;
          log(`User UID: ${uid}`);

          const collectionsToClear = [
            'users',
            'usernames',
            'roleAssignments',
            'problems',
            'supportingPartners',
            'settings',
            'communityTasks',
            'taskSubmissions',
            'taskCategories',
            'notifications',
            'impactPointTransactions'
          ];

          for (const colName of collectionsToClear) {
            const actualName = accessCollections[colName] || colName;
            await clearCollection(actualName);
          }

          log('All collections cleared');

          log('Writing role assignment...');
          const roleRef = doc(db, accessCollections.roleAssignments, 'spdly.studios@gmail.com');
          const roleDoc = {
            displayName: 'Spdly',
            role: 'Founder',
            isSupportingPartner: true,
            dashboardAccess: ['user', 'evaluator', 'superadmin', 'supportingPartner'],
            privileges: [
              'manage_system',
              'manage_roles',
              'manage_community',
              'manage_dashboards',
              'evaluate_submissions',
              'award_points',
              'close_verified_problems'
            ],
            updatedAt: serverTimestamp()
          };
          await setDoc(roleRef, roleDoc);
          log('Role assignment created');

          log('Writing username reservation...');
          const usernameRef = doc(db, accessCollections.usernames, 'spdly');
          await setDoc(usernameRef, {
            uid: uid,
            email: 'spdly.studios@gmail.com',
            username: 'spdly',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          log('Username spdly reserved');

          log('Writing user document...');
          const userRef = doc(db, accessCollections.users, uid);
          const userDoc = {
            id: uid,
            uid: uid,
            email: 'spdly.studios@gmail.com',
            displayName: 'Spdly',
            username: 'spdly',
            usernameLower: 'spdly',
            role: 'Founder',
            adminRole: 'Founder',
            isSupportingPartner: true,
            dashboardAccess: ['user', 'evaluator', 'superadmin', 'supportingPartner'],
            privileges: [
              'manage_system',
              'manage_roles',
              'manage_community',
              'manage_dashboards',
              'evaluate_submissions',
              'award_points',
              'close_verified_problems'
            ],
            joinedDate: new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
            stats: {
              experience: 0,
              impactPoints: 0,
              totalImpactPoints: 0,
              problemsSolved: 0,
              problemsIdentified: 0,
              helpfulResponses: 0,
              knowledgeContributions: 0
            },
            badges: ['first-step'],
            bio: 'Founder of Together We Solve',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          };
          await setDoc(userRef, userDoc);
          log('User document created');

          log('Writing settings document...');
          const settingsRef = doc(db, accessCollections.settings, 'global');
          await setDoc(settingsRef, {
            baseFrictionXP: 50,
            baseSolutionXP: 150,
            minTitleLength: 8,
            minFrictionLength: 40,
            encouragementLevel: 'medium',
            updatedAt: serverTimestamp()
          });
          log('Settings document created');

          log('Synchronizing LocalStorage...');
          const localUser = {
            ...userDoc,
            badges: [{ id: 'first-step', name: 'First Step', icon: '01', level: 'Automatic', description: 'Earned when a member creates a Together We Solve account.', source: 'automatic' }]
          };
          const localStore = {
            users: [localUser],
            problems: [],
            partners: [],
            tasks: [],
            taskSubmissions: [],
            taskCategories: [],
            notifications: [],
            logs: [{ id: 'log_seed', timestamp: new Date().toISOString(), type: 'SYSTEM', message: 'Database reset and seeded founder user.' }],
            settings: {
              baseFrictionXP: 50,
              baseSolutionXP: 150,
              minTitleLength: 8,
              minFrictionLength: 40,
              encouragementLevel: 'medium'
            }
          };
          localStorage.setItem('tws_local_data_v1', JSON.stringify(localStore));
          log('LocalStorage synchronized');

          log('\nSuccess! Seeding complete.');
          log('Founder Account:');
          log('Email: spdly.studios@gmail.com');
          log('Password: 14030507');
          log('Username: spdly');
        } catch (err) {
          log(`\nError: ${err.message}`);
          console.error(err);
        } finally {
          seedBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
